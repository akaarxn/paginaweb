<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarón Alcaide</title>
    <link rel="icon" type="image/png" href="files/thedehron-favicon.png">
    <style>
        body {
            background-color: white;
            color: black;
            font-family: Arial;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
            letter-spacing: -1.9px;
        }
        p {
            max-width: 800px;
            font-size: 2em;
            letter-spacing: -1px;
            margin: 20px; 
        }
        a {
            color: black;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        .inverted {
            background-color: black;
            color: white;
        }
        .inverted a {
            color: white;
        }
        #contador {
            font-size: 2em;
            margin-top: 30px;
        }
        @media (max-width: 600px) {
            p {
                font-size: 1.4em; 
                margin: 15px; 
            }
            #contador {
                font-size: 1.6em;
            }
        }
    </style>
</head>
<body>
   <div id="contador"></div>

   <script>
        // Contador hasta 19 de marzo
        const contador = document.getElementById('contador');

        function actualizarContador() {
            const ahora = new Date();
            const añoActual = ahora.getFullYear();
            const fechaMeta = new Date(`${añoActual}-03-19T00:00:00`);
            
            // Si ya pasó el 19 de marzo de este año, poner el siguiente año
            if (ahora > fechaMeta) {
                fechaMeta.setFullYear(añoActual + 1);
            }

            const diferencia = fechaMeta - ahora;

            // Calculamos meses aproximados
            const totalDias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            const meses = Math.floor(totalDias / 30);
            const dias = totalDias % 30;
            const horas = Math.floor((diferencia / (1000 * 60 * 60)) % 24);
            const minutos = Math.floor((diferencia / (1000 * 60)) % 60);
            const segundos = Math.floor((diferencia / 1000) % 60);

            contador.textContent = `En ${meses} meses, ${dias} días, ${horas} horas, ${minutos} minutos y ${segundos} segundos comienza.`;
        }

        setInterval(actualizarContador, 1000);
        actualizarContador();
   </script>
</body>
</html>
